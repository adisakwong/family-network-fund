<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะทางการเงิน - Family Network Fund</title>
    <!-- Include Stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <img src="img/logo1.png" alt="Logo" style="max-width: 50px; border: 1px solid rgb(255, 253, 253);">
            <h1 style="font-size: 18px; line-height: 1.2; margin-bottom: 2px;">Family Network Fund</h1>
            <p style="font-size: 16px; font-weight: 300; opacity: 0.95; margin-top: 0;">
                <b>for Healthcare and Funeral</b>
            </p>
            <p style="font-size: 13.5px; font-weight: 300; opacity: 0.95; margin-top: 0;">
                เงินสมทบทุนเครือญาติเพื่อสุขภาพและพิธีศพ</p>
        </header>

        <section id="financial-report-page" class="page active">
            <h2 style="margin: 0; font-size: 22px; margin-bottom: 20px;">รายงานสถานะทางการเงิน</h2>
            <div id="loading-financial"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 30vh; padding: 30px 20px; gap: 15px;">
                <div class="spinner"></div>
                <p style="margin: 0; font-weight: 500; color: var(--primary-color);">กำลังโหลดข้อมูลการเงิน...</p>
            </div>
            <div id="financial-report-content" style="margin-top: 15px; width: 100%; overflow-x: auto;">
                <!-- Table will be injected here -->
            </div>
        </section>
    </div>

    <footer style="text-align: center; margin-top: auto; font-size: 13px; color: #64748b; padding: 20px 0; width: 100%;">
        Copyright 2026 &copy; by Tech for Ummah
    </footer>

    <script>
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyz7dMJn1mWX1lN-0jAbflAb0YA2dD4Z4mFg0tEte0x2pi_SVzo4f1IcGdRi1dWDbuE/exec';

        document.addEventListener('DOMContentLoaded', async () => {
            const financialReportContent = document.getElementById('financial-report-content');
            const loadingFinancial = document.getElementById('loading-financial');

            try {
                const response = await fetch(`${GAS_WEB_APP_URL}?action=getFinancialReport`);
                const result = await response.json();
                
                loadingFinancial.style.display = 'none';
                
                if (result.success) {
                    renderFinancialReport(result.data);
                } else {
                    financialReportContent.innerHTML = `<p style="color:red; text-align:center;">เกิดข้อผิดพลาด: ${result.error}</p>`;
                }
            } catch (error) {
                loadingFinancial.style.display = 'none';
                financialReportContent.innerHTML = `<p style="color:red; text-align:center;">ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้</p>`;
            }
        });

        function renderFinancialReport(data) {
            if (!data || data.length === 0) {
                document.getElementById('financial-report-content').innerHTML = '<p style="text-align:center; color:#888;">ยังไม่มีข้อมูลการเงินในระบบ</p>';
                return;
            }

            const monthlyData = {};
            let totalIncome = 0;
            let totalOutcome = 0;

            data.forEach(item => {
                if (!item.date) return;
                const dateObj = new Date(item.date);
                if (isNaN(dateObj.getTime())) return;

                const monthKey = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
                const monthLabel = dateObj.toLocaleDateString('th-TH', { year: 'numeric', month: 'long' });

                if (!monthlyData[monthKey]) {
                    monthlyData[monthKey] = { label: monthLabel, income: 0, outcome: 0, time: dateObj.getTime() };
                }
                monthlyData[monthKey].income += (Number(item.income) || 0);
                monthlyData[monthKey].outcome += (Number(item.outcome) || 0);
                totalIncome += (Number(item.income) || 0);
                totalOutcome += (Number(item.outcome) || 0);
            });

            const sortedMonths = Object.values(monthlyData).sort((a, b) => a.time - b.time);
            
            let tableHtml = `
                <table class="financial-table">
                    <thead>
                        <tr>
                            <th style="text-align: left;">เดือน/ปี</th>
                            <th style="text-align: right; color: #10b981;">รายรับ</th>
                            <th style="text-align: right; color: #ef4444;">รายจ่าย</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            sortedMonths.forEach(month => {
                tableHtml += `
                    <tr>
                        <td style="text-align: left; font-size: 14px;">${month.label}</td>
                        <td style="text-align: right; color: #10b981; font-weight: 500;">${month.income.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                        <td style="text-align: right; color: #ef4444; font-weight: 500;">${month.outcome.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                    </tr>
                `;
            });

            const netBalance = totalIncome - totalOutcome;
            const balanceColor = netBalance >= 0 ? '#10b981' : '#ef4444';

            tableHtml += `
                    </tbody>
                    <tfoot>
                        <tr style="background-color: #f1f5f9; font-weight: bold;">
                            <td style="text-align: right; font-size: 14px;">รวมทั้งหมด</td>
                            <td style="text-align: right; color: #10b981;">${totalIncome.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                            <td style="text-align: right; color: #ef4444;">${totalOutcome.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                        </tr>
                        <tr style="background-color: #e0f2fe; font-weight: bold; font-size: 16px;">
                            <td style="text-align: right;">คงเหลือสุทธิ</td>
                            <td colspan="2" style="text-align: right; color: ${balanceColor};">${netBalance.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                        </tr>
                    </tfoot>
                </table>
            `;
            document.getElementById('financial-report-content').innerHTML = tableHtml;
        }
    </script>
</body>

</html>

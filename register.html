<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน - Family Network Fund</title>
    <!-- Include Stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <img src="img/logo1.png" alt="Logo" style="max-width: 50px; border: 1px solid rgb(255, 253, 253);">
            <h1 style="font-size: 18px; line-height: 1.2; margin-bottom: 2px;">Family Network Fund</h1>
            <p style="font-size: 16px; font-weight: 300; opacity: 0.95; margin-top: 0;">
                <b>for Healthcare and Funeral</b>
            </p>
            <p style="font-size: 13.5px; font-weight: 300; opacity: 0.95; margin-top: 0;">
                เงินสมทบทุนเครือญาติเพื่อสุขภาพและพิธีศพ</p>
        </header>

        <section id="register-page" class="page active">
            <h2 style="margin: 0; font-size: 22px; margin-bottom: 20px;">ลงทะเบียนสมาชิกใหม่ (Register)</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-person-id">รหัสบัตรประชาชน (13 หลัก)</label>
                    <input type="text" inputmode="numeric" id="reg-person-id" maxlength="13" pattern="\d{13}"
                        placeholder="กรอกรหัส 13 หลัก" required>
                </div>
                <div class="form-group">
                    <label for="reg-date">วันที่ลงทะเบียน (Register Date)</label>
                    <input type="date" id="reg-date" readonly required>
                </div>
                <div class="form-group">
                    <label for="reg-name">ชื่อ (Name)</label>
                    <input type="text" id="reg-name" required placeholder="กรอกชื่อ">
                </div>
                <div class="form-group">
                    <label for="reg-surname">นามสกุล (Surname)</label>
                    <input type="text" id="reg-surname" required placeholder="กรอกนามสกุล">
                </div>
                <div class="form-group">
                    <label for="reg-nickname">ชื่อเล่น (Nickname)</label>
                    <input type="text" id="reg-nickname" required placeholder="กรอกชื่อเล่น">
                </div>
                <div class="form-group">
                    <label for="reg-address">ที่อยู่ (Address)</label>
                    <textarea id="reg-address" rows="3" required placeholder="กรอกที่อยู่ปัจจุบัน"></textarea>
                </div>
                <div class="form-group">
                    <label for="reg-phone">เบอร์โทรศัพท์ (Phone)</label>
                    <input type="tel" id="reg-phone" inputmode="numeric" required placeholder="กรอกเบอร์โทรศัพท์">
                </div>
                <div class="form-group">
                    <label for="reg-birthdate">วัน/เดือน/ปีเกิด (Birthdate)</label>
                    <input type="date" id="reg-birthdate" required>
                </div>
                <div class="form-group">
                    <label for="reg-illness">โรคประจำตัว (Illness)</label>
                    <input type="text" id="reg-illness" placeholder="หากไม่มีให้เขียนว่า ไม่มี" required>
                </div>
                <div class="form-group">
                    <label for="reg-beneficiary">ผู้รับผลประโยชน์ (Beneficiary)</label>
                    <input type="text" id="reg-beneficiary" required placeholder="ระบุชื่อผู้รับผลประโยชน์">
                </div>
                <div class="form-group">
                    <label for="reg-related">ความเกี่ยวข้อง (Relationship)</label>
                    <input type="text" id="reg-related" required placeholder="เช่น บิดา, มารดา, บุตร, สามี, ภรรยา">
                </div>
                <div class="form-group">
                    <label>ถ่ายภาพ/อัปโหลดรูป (Photo)</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <button type="button" id="btn-open-camera" class="btn secondary small"
                            style="flex:1; padding: 10px;">📷 ถ่ายด้วยกล้อง</button>
                        <button type="button" id="btn-upload-image" class="btn secondary small"
                            style="flex:1; padding: 10px;">📁 เลือกรูปภาพ</button>
                    </div>
                    <input type="file" id="reg-image" accept="image/*" style="display:none;">

                    <div id="camera-container"
                        style="display:none; padding:10px; background:#f1f5f9; border:1px solid #cbd5e1; border-radius:8px; margin-bottom:10px;">
                        <video id="camera-video" autoplay playsinline
                            style="width:100%; max-height:250px; border-radius:8px; background-color:#000; object-fit:cover;"></video>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button type="button" id="btn-capture-photo" class="btn primary small"
                                style="flex:1; padding:10px;">📸 กดถ่ายภาพ</button>
                            <button type="button" id="btn-switch-camera" class="btn secondary small"
                                style="flex:1; padding:10px;">🔄 สลับกล้อง</button>
                        </div>
                    </div>
                    <canvas id="camera-canvas" style="display:none;"></canvas>

                    <div class="preview-container">
                        <img id="image-preview" src="" alt="Image Preview" style="display:none;">
                    </div>
                </div>
                <div class="form-group"
                    style="display: flex; align-items: flex-start; gap: 10px; margin-top: 25px; background: #fffbeb; border: 1px solid #fde68a; padding: 15px; border-radius: 8px;">
                    <input type="checkbox" id="reg-consent" required
                        style="width: 24px; height: 24px; cursor: pointer; margin-top: 2px;">
                    <label for="reg-consent"
                        style="margin-bottom: 0; font-size: 14px; font-weight: 500; color: #92400e; line-height: 1.5; cursor: pointer;">ข้าพเจ้าขอสมัครเข้าร่วมฯโดยมีเจตนาเพื่ออัลลอฮ์เท่านั้น</label>
                </div>
                <div class="button-group">
                    <button type="submit" id="btn-submit-reg" class="btn primary">บันทึกข้อมูลและลงทะเบียน</button>
                </div>
            </form>
        </section>
    </div>

    <footer
        style="text-align: center; margin-top: auto; font-size: 13px; color: #64748b; padding: 20px 0; width: 100%;">
        Copyright 2026 &copy; by Tech for Ummah
    </footer>

    <script>
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyz7dMJn1mWX1lN-0jAbflAb0YA2dD4Z4mFg0tEte0x2pi_SVzo4f1IcGdRi1dWDbuE/exec';

        document.addEventListener('DOMContentLoaded', () => {
            const regForm = document.getElementById('register-form');
            const regDateInput = document.getElementById('reg-date');
            const regImageInput = document.getElementById('reg-image');
            const imagePreview = document.getElementById('image-preview');
            const btnOpenCamera = document.getElementById('btn-open-camera');
            const btnUploadImage = document.getElementById('btn-upload-image');
            const btnCapturePhoto = document.getElementById('btn-capture-photo');
            const btnSwitchCamera = document.getElementById('btn-switch-camera');
            const cameraContainer = document.getElementById('camera-container');
            const cameraVideo = document.getElementById('camera-video');
            const cameraCanvas = document.getElementById('camera-canvas');

            let currentStream = null;
            let currentFacingMode = 'user';
            let base64Image = '';

            const today = new Date();
            regDateInput.value = today.toISOString().split('T')[0];

            btnUploadImage.addEventListener('click', () => {
                stopCamera();
                cameraContainer.style.display = 'none';
                regImageInput.click();
            });

            btnOpenCamera.addEventListener('click', async () => {
                if (currentStream) {
                    stopCamera();
                    cameraContainer.style.display = 'none';
                    return;
                }
                await startCamera();
            });

            btnSwitchCamera.addEventListener('click', async () => {
                currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
                await startCamera();
            });

            async function startCamera() {
                stopCamera();
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: currentFacingMode }
                    });
                    cameraVideo.srcObject = currentStream;
                    cameraContainer.style.display = 'block';
                    imagePreview.style.display = 'none';
                    base64Image = '';
                } catch (err) {
                    Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเปิดกล้องได้', 'error');
                }
            }

            function stopCamera() {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                    currentStream = null;
                }
            }

            btnCapturePhoto.addEventListener('click', () => {
                if (!currentStream) return;
                cameraCanvas.width = cameraVideo.videoWidth;
                cameraCanvas.height = cameraVideo.videoHeight;
                const ctx = cameraCanvas.getContext('2d');
                if (currentFacingMode === 'user') {
                    ctx.translate(cameraCanvas.width, 0);
                    ctx.scale(-1, 1);
                }
                ctx.drawImage(cameraVideo, 0, 0, cameraCanvas.width, cameraCanvas.height);
                base64Image = cameraCanvas.toDataURL('image/jpeg', 0.8);
                imagePreview.src = base64Image;
                imagePreview.style.display = 'block';
                stopCamera();
                cameraContainer.style.display = 'none';
            });

            regImageInput.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        base64Image = event.target.result;
                        imagePreview.src = base64Image;
                        imagePreview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });

            regForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!base64Image) {
                    Swal.fire('ข้อผิดพลาด', 'กรุณาถ่ายภาพหรือเลือกรูปภาพ', 'error');
                    return;
                }

                Swal.fire({
                    title: 'กำลังบันทึกข้อมูล...',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                const personIdField = document.getElementById('reg-person-id');
                const personId = personIdField ? personIdField.value.trim() : '';
                const registerDate = regDateInput.value;
                const name = document.getElementById('reg-name').value.trim();
                const surname = document.getElementById('reg-surname').value.trim();
                const nickname = document.getElementById('reg-nickname').value.trim();
                const address = document.getElementById('reg-address').value.trim();
                const phone = document.getElementById('reg-phone').value.trim();
                const birthdate = document.getElementById('reg-birthdate').value;
                const illness = document.getElementById('reg-illness').value.trim();
                const beneficiary = document.getElementById('reg-beneficiary').value.trim();
                const related = document.getElementById('reg-related').value.trim();

                const formData = {
                    registerDate,
                    personId,
                    name,
                    surname,
                    nickname,
                    address,
                    phone,
                    birthdate,
                    illness,
                    beneficiary,
                    related,
                    imageFile: base64Image,
                    imageName: 'photo.jpg'
                };

                try {
                    const response = await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        },
                        body: JSON.stringify({ action: 'registerMember', data: formData })
                    });
                    const result = await response.json();
                    if (result.success) {
                        Swal.fire('สำเร็จ', 'ลงทะเบียนเรียบร้อยแล้ว', 'success').then(() => {
                            regForm.reset();
                            imagePreview.style.display = 'none';
                            base64Image = '';
                            regDateInput.value = new Date().toISOString().split('T')[0];
                        });
                    } else {
                        Swal.fire('ข้อผิดพลาด', result.error, 'error');
                    }
                } catch (error) {
                    Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                }
            });
        });
    </script>
</body>

</html>
